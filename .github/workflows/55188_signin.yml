name: Auto Sign-in for BBS

on:
  schedule:
    - cron: '00 23 * * *'
  workflow_dispatch:

jobs:
  sign_in_job:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ================================
      # 🔥 强制修复 DNS（关键）
      # ================================
      - name: Fix DNS
        run: |
          echo "===== BEFORE DNS ====="
          cat /etc/resolv.conf

          echo "===== SET DNS ====="
          sudo rm -f /etc/resolv.conf

          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          echo "nameserver 1.1.1.1" | sudo tee -a /etc/resolv.conf

          echo "===== AFTER DNS ====="
          cat /etc/resolv.conf

      # ================================
      # 环境信息
      # ================================
      - name: Network Check
        run: |
          echo "Runner IP:"
          curl -s ifconfig.me || true

          echo ""
          echo "DNS Test:"
          nslookup www.55188.com || true

      # ================================
      # Python
      # ================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ================================
      # Run script
      # ================================
      - name: Run sign-in script
        env:
          MY_COOKIE: ${{ secrets.MY_COOKIE }}
          WX_CORPID: ${{ secrets.WX_CORPID }}
          WX_CORPSECRET: ${{ secrets.WX_CORPSECRET }}
          WX_AGENTID: ${{ secrets.WX_AGENTID }}
        run: python 55188_signin.py
